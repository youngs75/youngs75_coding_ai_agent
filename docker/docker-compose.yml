# youngs75_coding_ai_agent 프로덕션 배포 — MCP 3개 + Agent 3개 + CLI 1개 = 7 컨테이너
#
# 구성:
#   MCP 서버:  Tavily(:3001) + arXiv(:3000) + Serper(:3002)
#   Agent:     SimpleReAct(:18081) + DeepResearch(:18082) + DeepResearchA2A(:18083)
#   CLI:       대화형 에이전트 인터페이스 (youngs75-agent)
#
# 사용법:
#   cd docker
#   docker compose up -d          # 전체 기동
#   docker compose ps             # 상태 확인
#   docker compose logs -f agent-deep-research  # 특정 서비스 로그
#   docker compose run --rm cli   # CLI 대화형 모드 실행
#   docker compose down           # 종료
#
# 빌드 컨텍스트: 프로젝트 루트 (..)
# 테스트:
#   export $(grep -v '^#' .env | xargs)
#   python -m youngs75_a2a.tests.test_docker_e2e

services:
  # ═══════════════════════════════════════════════
  #  MCP 서버 (도구 제공)
  # ═══════════════════════════════════════════════

  mcp-tavily:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: youngs75_mcp_tavily
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    command: ["python", "/app/run_tavily_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3001/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - youngs75_net

  mcp-arxiv:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: youngs75_mcp_arxiv
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: ["python", "/app/run_arxiv_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3000/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - youngs75_net

  mcp-serper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: youngs75_mcp_serper
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ../.env
    command: ["python", "/app/run_serper_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3002/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - youngs75_net

  # ═══════════════════════════════════════════════
  #  Agent 서버 (A2A 프로토콜)
  # ═══════════════════════════════════════════════

  agent-simple-react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: youngs75_agent_simple_react
    restart: unless-stopped
    ports:
      - "18081:18081"
    env_file:
      - ../.env
    environment:
      - AGENT_PORT=18081
      - AGENT_MODEL=deepseek/deepseek-v3.2
      - TAVILY_MCP_URL=http://mcp-tavily:3001/mcp/
      # LangSmith 원격 트레이싱 비활성화 (불필요한 401 오류 방지)
      - LANGCHAIN_TRACING_V2=false
    command: ["python", "-m", "youngs75_a2a.tests.run_simple_react_server"]
    depends_on:
      mcp-tavily:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - youngs75_net

  agent-deep-research:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: youngs75_agent_deep_research
    restart: unless-stopped
    ports:
      - "18082:18082"
    env_file:
      - ../.env
    environment:
      - AGENT_PORT=18082
      - AGENT_MODEL=deepseek/deepseek-v3.2
      - TAVILY_MCP_URL=http://mcp-tavily:3001/mcp/
      - ARXIV_MCP_URL=http://mcp-arxiv:3000/mcp/
      - SERPER_MCP_URL=http://mcp-serper:3002/mcp/
      - LANGCHAIN_TRACING_V2=false
    command: ["python", "-m", "youngs75_a2a.tests.run_agent_server"]
    depends_on:
      mcp-tavily:
        condition: service_healthy
      mcp-arxiv:
        condition: service_healthy
      mcp-serper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - youngs75_net

  agent-deep-research-a2a:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: youngs75_agent_deep_research_a2a
    restart: unless-stopped
    ports:
      - "18083:18083"
    env_file:
      - ../.env
    environment:
      - AGENT_PORT=18083
      - AGENT_MODEL=deepseek/deepseek-v3.2
      - TAVILY_MCP_URL=http://mcp-tavily:3001/mcp/
      - ARXIV_MCP_URL=http://mcp-arxiv:3000/mcp/
      - SERPER_MCP_URL=http://mcp-serper:3002/mcp/
      - LANGCHAIN_TRACING_V2=false
    command: ["python", "-m", "youngs75_a2a.tests.run_deep_research_a2a_server"]
    depends_on:
      mcp-tavily:
        condition: service_healthy
      mcp-arxiv:
        condition: service_healthy
      mcp-serper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18083/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - youngs75_net

  # ═══════════════════════════════════════════════
  #  CLI 대화형 인터페이스
  # ═══════════════════════════════════════════════

  cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cli
    container_name: youngs75_cli
    env_file:
      - ../.env
    environment:
      # 모델 설정
      - MODEL_PROVIDER=${MODEL_PROVIDER:-openrouter}
      - MODEL_NAME=${MODEL_NAME:-deepseek/deepseek-v3.2}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # MCP 서버 엔드포인트 (컨테이너 네트워크 내부 주소)
      - TAVILY_MCP_URL=http://mcp-tavily:3001/mcp/
      - ARXIV_MCP_URL=http://mcp-arxiv:3000/mcp/
      - SERPER_MCP_URL=http://mcp-serper:3002/mcp/
      # Agent 서버 엔드포인트 (CLI에서 에이전트 접근용)
      - SIMPLE_REACT_URL=http://agent-simple-react:18081
      - DEEP_RESEARCH_URL=http://agent-deep-research:18082
      - DEEP_RESEARCH_A2A_URL=http://agent-deep-research-a2a:18083
    # 대화형 모드 활성화
    stdin_open: true
    tty: true
    depends_on:
      mcp-tavily:
        condition: service_healthy
      mcp-arxiv:
        condition: service_healthy
      mcp-serper:
        condition: service_healthy
      agent-simple-react:
        condition: service_healthy
      agent-deep-research:
        condition: service_healthy
      agent-deep-research-a2a:
        condition: service_healthy
    networks:
      - youngs75_net

networks:
  youngs75_net:
    driver: bridge
