# youngs75_a2a 통합 Harness — 샌드박스 아키텍처
#
# 구성:
#   1. litellm-proxy  (:4000)  — LLM Gateway + Langfuse 트레이싱
#   2. mcp-server     (:3003)  — 통합 MCP (코드 도구 + 검색)
#   3. agent-coding   (:18084) — CodingAssistant (샌드박스 + CLI)
#   4. orchestrator   (:18080) — Orchestrator 에이전트
#
# 사용법:
#   make up-harness          # 전체 기동
#   make health-check        # 헬스체크
#   ./youngs75-agent.sh      # CLI 접속 (docker exec)
#   ./youngs75-agent.sh --export  # 결과물 추출
#   make down-harness        # 종료

services:
  # ═══════════════════════════════════════════════
  #  PostgreSQL (LiteLLM 내부 DB)
  # ═══════════════════════════════════════════════

  litellm-db:
    image: postgres:16-alpine
    container_name: harness_litellm_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  LiteLLM Proxy (LLM Gateway + UI + DB)
  # ═══════════════════════════════════════════════

  litellm-proxy:
    image: ghcr.io/berriai/litellm-database:main-latest
    container_name: harness_litellm_proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    env_file:
      - ../.env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - DATABASE_URL=postgresql://litellm:litellm@litellm-db:5432/litellm
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    command: ["--config", "/app/config.yaml"]
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request as r; r.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  통합 MCP 서버 (코드 도구 + 웹/논문 검색)
  # ═══════════════════════════════════════════════

  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: harness_mcp_server
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - CODE_TOOLS_PORT=3003
      - CODE_TOOLS_WORKSPACE=/workspace
      - MCP_MOUNT_ROOT=/workspace
    env_file:
      - ../.env
    volumes:
      - workspace_data:/workspace
    command: ["python", "/app/run_code_tools_mcp.py"]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf -X POST -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' -d '{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"id\":1,\"params\":{\"protocolVersion\":\"2025-03-26\",\"capabilities\":{},\"clientInfo\":{\"name\":\"hc\",\"version\":\"1\"}}}' http://localhost:3003/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  CodingAssistant 에이전트 (샌드박스)
  # ═══════════════════════════════════════════════

  agent-coding-assistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: harness_agent_coding
    restart: unless-stopped
    ports:
      - "18084:18084"
    environment:
      - AGENT_PORT=18084
      - CODE_TOOLS_MCP_URL=http://mcp-server:3003/mcp/
      - CODE_TOOLS_WORKSPACE=/workspace
      # LiteLLM Proxy 경유
      - LITELLM_PROXY_URL=http://litellm-proxy:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - LLM_PROVIDER=${LLM_PROVIDER:-dashscope}
      # Phase 11 설정
      - HOOK_CONFIG_PATH=${HOOK_CONFIG_PATH:-}
      - TOOL_PERMISSIONS_PATH=${TOOL_PERMISSIONS_PATH:-}
      - ENABLE_PARALLEL_TOOLS=${ENABLE_PARALLEL_TOOLS:-true}
      - COORDINATOR_MODE=${COORDINATOR_MODE:-false}
    volumes:
      - workspace_data:/workspace
    command: ["python", "-m", "youngs75_a2a.tests.run_coding_assistant_server"]
    depends_on:
      mcp-server:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18084/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  Orchestrator 에이전트
  # ═══════════════════════════════════════════════

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: harness_orchestrator
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      - ORCH_PORT=18080
      - CODING_ASSISTANT_URL=http://agent-coding-assistant:18084
      - COORDINATOR_MODE=${COORDINATOR_MODE:-false}
      - LITELLM_PROXY_URL=http://litellm-proxy:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - LLM_PROVIDER=${LLM_PROVIDER:-dashscope}
    command: ["python", "-m", "youngs75_a2a.tests.run_orchestrator_server"]
    depends_on:
      agent-coding-assistant:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  평가 파이프라인 (선택, --profile eval)
  # ═══════════════════════════════════════════════

  eval-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.eval
    container_name: harness_eval_runner
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      - LOCAL_CORPUS_DIR=/app/data/corpus
      - CODING_AGENT_URL=http://agent-coding-assistant:18084
    volumes:
      - ../data:/app/data
    depends_on:
      agent-coding-assistant:
        condition: service_healthy
    profiles:
      - eval
    networks:
      - harness_net

volumes:
  litellm_db_data:
    driver: local
  workspace_data:
    driver: local

networks:
  harness_net:
    driver: bridge
