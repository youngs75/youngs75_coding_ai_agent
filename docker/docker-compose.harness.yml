# youngs75_a2a 통합 Harness — 에이전트 + 평가
#
# 기본 기동 (MCP + CodingAssistant):
#   docker compose -f docker/docker-compose.harness.yml up -d
#
# 평가 파이프라인 실행:
#   docker compose -f docker/docker-compose.harness.yml run eval-runner --step 5
#
# 전체 종료:
#   docker compose -f docker/docker-compose.harness.yml down

services:
  # ═══════════════════════════════════════════════
  #  MCP 서버 (도구 제공)
  # ═══════════════════════════════════════════════

  mcp-tavily:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: harness_mcp_tavily
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    command: ["python", "/app/run_tavily_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3001/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - harness_net

  mcp-arxiv:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: harness_mcp_arxiv
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: ["python", "/app/run_arxiv_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3000/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - harness_net

  mcp-serper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: harness_mcp_serper
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ../.env
    command: ["python", "/app/run_serper_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3002/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  MCP Code Tools (파일 I/O, 코드 검색, 코드 실행)
  # ═══════════════════════════════════════════════

  mcp-code-tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: harness_mcp_code_tools
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - CODE_TOOLS_PORT=3003
      - CODE_TOOLS_WORKSPACE=/workspace
    env_file:
      - ../.env
    volumes:
      - ${CODE_TOOLS_WORKSPACE:-..}:/workspace
    command: ["python", "/app/run_code_tools_mcp.py"]
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "-w", "%{http_code}", "http://localhost:3003/mcp"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  에이전트 (A2A 프로토콜)
  # ═══════════════════════════════════════════════

  agent-coding-assistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: harness_agent_coding
    restart: unless-stopped
    ports:
      - "18084:18084"
    env_file:
      - ../.env
    environment:
      - AGENT_PORT=18084
      - AGENT_MODEL=deepseek/deepseek-v3.2
      - CODE_TOOLS_MCP_URL=http://mcp-code-tools:3003/mcp/
      # Phase 11 설정
      - HOOK_CONFIG_PATH=${HOOK_CONFIG_PATH:-}
      - TOOL_PERMISSIONS_PATH=${TOOL_PERMISSIONS_PATH:-}
      - ENABLE_PARALLEL_TOOLS=${ENABLE_PARALLEL_TOOLS:-true}
      - COORDINATOR_MODE=${COORDINATOR_MODE:-false}
    command: ["python", "-m", "youngs75_a2a.tests.run_coding_assistant_server"]
    depends_on:
      mcp-code-tools:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18084/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  오케스트레이터 (에이전트 라우팅)
  # ═══════════════════════════════════════════════

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: harness_orchestrator
    restart: unless-stopped
    ports:
      - "18080:18080"
    env_file:
      - ../.env
    environment:
      - ORCH_PORT=18080
      - AGENT_MODEL=deepseek/deepseek-v3.2
      - SIMPLE_REACT_URL=http://agent-simple-react:18081
      - DEEP_RESEARCH_URL=http://agent-deep-research:18082
      - DEEP_RESEARCH_A2A_URL=http://agent-deep-research-a2a:18083
      - CODING_ASSISTANT_URL=http://agent-coding-assistant:18084
      - COORDINATOR_MODE=${COORDINATOR_MODE:-false}
    command: ["python", "-m", "youngs75_a2a.tests.run_orchestrator_server"]
    depends_on:
      agent-coding-assistant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - harness_net

  # ═══════════════════════════════════════════════
  #  평가 파이프라인 (실행 후 종료)
  # ═══════════════════════════════════════════════

  eval-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.eval
    container_name: harness_eval_runner
    env_file:
      - ../.env
    environment:
      - DATA_DIR=/app/data
      - LOCAL_CORPUS_DIR=/app/data/corpus
      - CODING_AGENT_URL=http://agent-coding-assistant:18084
    volumes:
      - ../data:/app/data
    depends_on:
      agent-coding-assistant:
        condition: service_healthy
    profiles:
      - eval
    networks:
      - harness_net

networks:
  harness_net:
    driver: bridge
