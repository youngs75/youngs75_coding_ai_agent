# MCP 서버들을 위한 Docker Compose 설정
# Tavily, ArXiv, Serper 검색 서버들을 독립적으로 실행

services:
  # Code Tools MCP 서버 (파일 I/O, 코드 검색, 코드 실행)
  code-tools-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mcp_code_tools_server
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - CODE_TOOLS_PORT=3003
      - CODE_TOOLS_WORKSPACE=/workspace
    env_file:
      - ../.env
    volumes:
      - ${CODE_TOOLS_WORKSPACE:-..}:/workspace
    command: ["python", "/app/run_code_tools_mcp.py"]
    networks:
      - mcp_network

  # Tavily 웹 검색 MCP 서버
  tavily-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mcp_tavily_server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    env_file:
      - ../.env
    command: ["python", "/app/run_tavily_mcp.py"]
    networks:
      - mcp_network

  # ArXiv 논문 검색 MCP 서버
  arxiv-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mcp_arxiv_server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    command: ["python", "/app/run_arxiv_mcp.py"]
    networks:
      - mcp_network

  # Serper Google 검색 MCP 서버
  serper-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mcp_serper_server
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - SERPER_API_KEY=${SERPER_API_KEY:-}
    env_file:
      - ../.env
    command: ["python", "/app/run_serper_mcp.py"]
    networks:
      - mcp_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mcp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mcp_network

  # Redis Commander (선택사항 - 개발용)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mcp_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=mcp2025
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mcp_network
    profiles:
      - tools

volumes:
  redis_data:
    driver: local

networks:
  mcp_network:
    driver: bridge