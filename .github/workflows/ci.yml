# CI 파이프라인 — Lint, Test, Docker Build 검증
#
# 트리거: main 브랜치로의 push 또는 pull_request
# uv 캐싱을 적용하여 의존성 설치 시간을 최소화한다.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 코드 품질 검사 (ruff lint + format)
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: uv 설치
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: 의존성 설치
        run: uv sync --frozen

      - name: ruff check (린트)
        run: uv run ruff check .

      - name: ruff format --check (포맷 검증)
        run: uv run ruff format --check .

  # ──────────────────────────────────────────────
  # Job 2: 단위/통합 테스트 (eval 제외)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: uv 설치
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: 의존성 설치 (dev 포함)
        run: uv sync --frozen

      - name: pytest 실행 (eval 테스트 제외)
        env:
          # 시크릿은 GitHub Secrets에서 주입
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 테스트 시 LangSmith 트레이싱 비활성화
          LANGCHAIN_TRACING_V2: "false"
        run: uv run pytest tests/ --ignore=tests/eval/ -v

  # ──────────────────────────────────────────────
  # Job 3: Docker 이미지 빌드 검증
  # ──────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Compose 빌드 검증
        working-directory: docker
        run: docker compose build
