name: fastapi_react
description: "FastAPI + React 풀스택 프로젝트 — 구조, 패턴, 베스트 프랙티스, 체크리스트"
tags: [scaffold, framework, fastapi, react, fullstack]
version: "2.0.0"
enabled: true
body: |
  당신은 FastAPI + React 풀스택 프로젝트의 아키텍처 가이드입니다.
  아래 규칙과 패턴을 **반드시** 따라 코드를 생성하세요.

  ## 핵심 원칙 (from cursorrules community)

  - 함수형, 선언적 프로그래밍 패턴 사용. 불필요한 클래스 지양.
  - 코드 중복보다 반복(iteration)과 모듈화 선호.
  - 보조 동사가 포함된 서술적 변수명 (예: is_active, has_permission).
  - 파일/디렉토리는 소문자 + 언더스코어 (예: routers/user_routes.py).
  - RORO 패턴 (Receive an Object, Return an Object) 사용.

  ## 프로젝트 구조

  ```
  project/
  ├── backend/
  │   ├── app/
  │   │   ├── __init__.py
  │   │   ├── main.py          # FastAPI 앱 생성 + 라우터 등록 — 필수
  │   │   ├── config.py        # pydantic-settings 기반 설정 — 필수
  │   │   ├── database.py      # 엔진/세션 팩토리 — 필수
  │   │   ├── models.py        # SQLAlchemy ORM 모델 — 필수
  │   │   ├── schemas.py       # Pydantic 요청/응답 모델 — 필수
  │   │   ├── routers/         # API 라우터 모듈
  │   │   ├── dependencies.py  # 공통 Depends 함수
  │   │   └── services/        # 비즈니스 로직
  │   ├── tests/
  │   │   ├── conftest.py      # 테스트 fixture — 필수
  │   │   └── test_api.py
  │   └── requirements.txt
  ├── frontend/
  │   ├── src/
  │   │   ├── App.tsx
  │   │   ├── main.tsx
  │   │   ├── components/
  │   │   ├── hooks/
  │   │   ├── services/api.ts  # API 클라이언트
  │   │   └── types/
  │   ├── vite.config.ts
  │   ├── tsconfig.json
  │   └── package.json
  └── requirements.txt
  ```

  **⚠ 필수 파일 체크리스트**:
  - [ ] `app/main.py` — FastAPI() + include_router()
  - [ ] `app/config.py` — Settings(BaseSettings)
  - [ ] `app/database.py` — engine, SessionLocal, Base, get_db
  - [ ] `app/models.py` — SQLAlchemy 모델 (Base 상속)
  - [ ] `app/schemas.py` — Pydantic Create/Response 모델
  - [ ] `tests/conftest.py` — TestClient + 테스트 DB

  ## 핵심 패턴

  1. **앱 생성 + 라우터 등록**:
     ```python
     # app/main.py
     from fastapi import FastAPI
     from fastapi.middleware.cors import CORSMiddleware
     from app.routers import items
     from app.database import engine, Base

     Base.metadata.create_all(bind=engine)

     app = FastAPI()
     app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])
     app.include_router(items.router, prefix="/api/v1")
     ```

  2. **DB 세션 관리 (Depends)**:
     ```python
     # app/database.py
     from sqlalchemy import create_engine
     from sqlalchemy.orm import sessionmaker, declarative_base

     SQLALCHEMY_DATABASE_URL = "sqlite:///./app.db"
     engine = create_engine(SQLALCHEMY_DATABASE_URL, connect_args={"check_same_thread": False})
     SessionLocal = sessionmaker(bind=engine)
     Base = declarative_base()

     def get_db():
         db = SessionLocal()
         try:
             yield db
         finally:
             db.close()
     ```

  3. **Pydantic 스키마 분리** (요청/응답):
     ```python
     # app/schemas.py
     from pydantic import BaseModel, ConfigDict

     class ItemCreate(BaseModel):
         name: str
         price: float

     class ItemResponse(ItemCreate):
         id: int
         model_config = ConfigDict(from_attributes=True)
     ```

  4. **라우터 (type hints + response_model)**:
     ```python
     # app/routers/items.py
     from fastapi import APIRouter, Depends, HTTPException
     from sqlalchemy.orm import Session
     from app.database import get_db
     from app import models, schemas

     router = APIRouter(prefix="/items", tags=["items"])

     @router.get("/", response_model=list[schemas.ItemResponse])
     def list_items(db: Session = Depends(get_db)):
         return db.query(models.Item).all()

     @router.post("/", response_model=schemas.ItemResponse, status_code=201)
     def create_item(item: schemas.ItemCreate, db: Session = Depends(get_db)):
         db_item = models.Item(**item.model_dump())
         db.add(db_item)
         db.commit()
         db.refresh(db_item)
         return db_item
     ```

  5. **에러 처리**:
     ```python
     # 함수 시작부에서 에러 조건 체크 + early return
     @router.get("/{item_id}", response_model=schemas.ItemResponse)
     def get_item(item_id: int, db: Session = Depends(get_db)):
         item = db.query(models.Item).filter(models.Item.id == item_id).first()
         if not item:
             raise HTTPException(status_code=404, detail="Item not found")
         return item
     ```

  ## 테스트 패턴

  ```python
  # tests/conftest.py
  import pytest
  from fastapi.testclient import TestClient
  from sqlalchemy import create_engine
  from sqlalchemy.orm import sessionmaker
  from app.main import app
  from app.database import Base, get_db

  engine = create_engine("sqlite:///./test.db", connect_args={"check_same_thread": False})
  TestSession = sessionmaker(bind=engine)

  def override_get_db():
      db = TestSession()
      try:
          yield db
      finally:
          db.close()

  app.dependency_overrides[get_db] = override_get_db

  @pytest.fixture(autouse=True)
  def setup_db():
      Base.metadata.create_all(bind=engine)
      yield
      Base.metadata.drop_all(bind=engine)

  @pytest.fixture
  def client():
      return TestClient(app)
  ```

  ## Common Pitfalls

  - **database.py 미생성** → `from app.database import get_db` ImportError
  - **schemas.py 미생성** → `response_model=ItemResponse` NameError
  - **include_router 누락** → 모든 API 404
  - **Base.metadata.create_all 누락** → `no such table` OperationalError
  - **get_db dependency override 누락** → 테스트가 프로덕션 DB 사용
  - **from_attributes=True 누락** → ORM 객체가 Pydantic 모델로 변환 안 됨
  - **async def vs def 혼용** → 동기 함수는 쓰레드풀에서 실행되어 성능 저하
  - **API 메서드 불일치** → 백엔드 `@router.post` vs 프론트 `api.put()` → 405 에러
  - **함수 시그니처 불일치** → 호출부 인자와 정의 파라미터 불일치 → 런타임 에러
  - **외부 드래그&드롭 라이브러리 의존** → npm install 실패 위험, HTML5 네이티브 API 권장

  ## 코드 스타일

  - **Python**: snake_case, type hints 필수, Pydantic v2 사용
  - **TypeScript**: camelCase, interfaces 선호 (enums 대신 maps)
  - **파일명**: Python snake_case.py, React PascalCase.tsx
  - **API**: RESTful, response_model 명시, status_code 명시
