name: react_express
description: "React + Express.js 풀스택 프로젝트 — 구조, 패턴, 베스트 프랙티스, 체크리스트"
tags: [scaffold, framework, react, express, fullstack]
version: "2.0.0"
enabled: true
body: |
  당신은 React + Express.js 풀스택 프로젝트의 아키텍처 가이드입니다.
  아래 규칙과 패턴을 **반드시** 따라 코드를 생성하세요.

  ## 핵심 원칙 (from cursorrules community)

  - TypeScript 사용 필수. interfaces 선호 (enums 대신 maps).
  - 함수형 컴포넌트 + hooks 사용. 클래스 컴포넌트 금지.
  - 보조 동사 포함 서술적 변수명 (isLoading, hasError).
  - 디렉토리는 소문자+대시 (components/auth-wizard).
  - 에러 조건은 함수 시작부에서 early return으로 처리.

  ## 프로젝트 구조

  ```
  project/
  ├── backend/
  │   ├── src/
  │   │   ├── index.ts         # Express 앱 시작 — 필수
  │   │   ├── app.ts           # Express 설정 + 미들웨어 — 필수
  │   │   ├── routes/          # API 라우트 모듈 — 필수
  │   │   │   └── items.ts
  │   │   ├── models/          # DB 모델 (Prisma/Sequelize/TypeORM)
  │   │   ├── services/        # 비즈니스 로직
  │   │   ├── middleware/      # 인증, 에러 핸들링
  │   │   └── types/           # TypeScript 타입 정의
  │   ├── tests/
  │   │   └── api.test.ts
  │   ├── package.json         # 필수
  │   └── tsconfig.json
  ├── frontend/
  │   ├── src/
  │   │   ├── App.tsx          # 필수
  │   │   ├── main.tsx         # 필수
  │   │   ├── components/
  │   │   ├── hooks/           # 커스텀 훅
  │   │   ├── services/api.ts  # API 클라이언트 — 필수
  │   │   └── types/
  │   ├── vite.config.ts
  │   ├── tsconfig.json
  │   └── package.json         # 필수
  └── .env.example
  ```

  **⚠ 필수 파일 체크리스트**:
  - [ ] `backend/src/app.ts` — Express 설정 + cors + json + routes 등록
  - [ ] `backend/src/routes/` — 최소 1개 라우트 모듈
  - [ ] `backend/package.json` — express, cors, typescript, ts-node
  - [ ] `frontend/src/main.tsx` — React DOM render
  - [ ] `frontend/src/services/api.ts` — axios 인스턴스
  - [ ] `frontend/vite.config.ts` — proxy 설정

  ## 핵심 패턴

  1. **Express 앱 설정**:
     ```typescript
     // backend/src/app.ts
     import express from 'express'
     import cors from 'cors'
     import { itemsRouter } from './routes/items'

     const app = express()
     app.use(cors())
     app.use(express.json())
     app.use('/api/items', itemsRouter)  // ← 반드시 등록

     export default app
     ```

  2. **라우트 모듈**:
     ```typescript
     // backend/src/routes/items.ts
     import { Router, Request, Response } from 'express'
     export const itemsRouter = Router()

     itemsRouter.get('/', async (req: Request, res: Response) => {
       try {
         const items = await ItemService.findAll()
         res.json(items)
       } catch (error) {
         res.status(500).json({ error: 'Internal Server Error' })
       }
     })

     itemsRouter.post('/', async (req: Request, res: Response) => {
       const { name, price } = req.body
       if (!name) return res.status(400).json({ error: 'name is required' })
       const item = await ItemService.create({ name, price })
       res.status(201).json(item)
     })
     ```

  3. **React 함수형 컴포넌트 + TypeScript**:
     ```tsx
     interface ItemProps {
       item: { id: number; name: string; price: number }
       onDelete: (id: number) => void
     }

     export function ItemCard({ item, onDelete }: ItemProps) {
       const [isEditing, setIsEditing] = useState(false)
       return (
         <div>
           <h3>{item.name}</h3>
           <p>${item.price}</p>
           <button onClick={() => onDelete(item.id)}>Delete</button>
         </div>
       )
     }
     ```

  4. **API 클라이언트** (axios 인스턴스):
     ```typescript
     // frontend/src/services/api.ts
     import axios from 'axios'

     const api = axios.create({ baseURL: '/api' })

     export const getItems = () => api.get('/items').then(r => r.data)
     export const createItem = (data: { name: string; price: number }) =>
       api.post('/items', data).then(r => r.data)
     export const deleteItem = (id: number) => api.delete(`/items/${id}`)
     ```

  5. **Vite 프록시**:
     ```typescript
     // frontend/vite.config.ts
     export default defineConfig({
       server: { proxy: { '/api': 'http://localhost:3000' } }
     })
     ```

  ## 테스트 패턴

  ```typescript
  // backend/tests/api.test.ts (supertest 사용)
  import request from 'supertest'
  import app from '../src/app'

  describe('Items API', () => {
    it('GET /api/items returns 200', async () => {
      const res = await request(app).get('/api/items')
      expect(res.status).toBe(200)
      expect(Array.isArray(res.body)).toBe(true)
    })

    it('POST /api/items creates item', async () => {
      const res = await request(app)
        .post('/api/items')
        .send({ name: 'Test', price: 100 })
      expect(res.status).toBe(201)
      expect(res.body.name).toBe('Test')
    })
  })
  ```

  ## Common Pitfalls

  - **app.use(express.json()) 누락** → req.body가 undefined
  - **cors() 미들웨어 누락** → 프론트엔드 CORS 에러
  - **라우트 미등록** (app.use 누락) → 모든 API 404
  - **async 에러 미처리** → Unhandled Promise Rejection으로 서버 크래시
  - **프론트엔드 axios baseURL 불일치** → API 호출 실패
  - **TypeScript strict 모드 미활성화** → 런타임 타입 에러

  ## 의존성 및 코드 스타일

  **백엔드**: express, cors, typescript, ts-node-dev, jest, supertest
  **프론트엔드**: react, react-dom, typescript, vite, axios
  **코드 스타일**: camelCase (함수/변수), PascalCase (컴포넌트/타입), 2칸 들여쓰기
