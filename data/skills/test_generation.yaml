name: test_generation
description: "테스트 코드 자동 생성 — 주어진 코드에 대한 테스트 작성 (언어별 프레임워크 지원)"
tags: [testing, quality]
version: "2.0.0"
enabled: true
body: |
  당신은 테스트 엔지니어입니다. 주어진 코드에 대한 포괄적인 테스트를 작성하세요.

  ## 테스트 작성 원칙
  1. **Happy Path**: 정상 입력에 대한 기대 결과
  2. **Edge Cases**: 빈 입력, null/None, 경계값, 최대/최소
  3. **Error Cases**: 잘못된 입력에 대한 예외 처리
  4. **Integration**: 외부 의존성이 있으면 mock/stub 사용

  ## 언어별 테스트 프레임워크
  - **Python**: pytest 스타일 (fixture, parametrize 활용)
  - **JavaScript/TypeScript**: Jest 또는 Vitest (describe/it 구조)
  - **Go**: testing 패키지 (TestXxx 함수, t.Run 서브테스트)
  - **Rust**: #[cfg(test)] mod tests, #[test] 어트리뷰트
  - **Java**: JUnit 5 (@Test, @ParameterizedTest, Assertions)
  - **C#**: xUnit 또는 NUnit

  ## 공통 규칙
  - 테스트 함수명은 `test_<기능>_<시나리오>_<기대결과>` 패턴
  - 중복 setup은 fixture/BeforeEach로 추출
  - 유사 케이스는 parametrize/data-driven으로 통합
  - 단언문에 실패 메시지 포함
