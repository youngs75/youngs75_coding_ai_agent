name: flask_vue
description: "Flask + Vue.js SPA 풀스택 프로젝트 — 구조, 패턴, 베스트 프랙티스 안내"
tags: [scaffold, framework, flask, vue, fullstack]
version: "1.0.0"
enabled: true
body: |
  당신은 Flask + Vue.js 풀스택 프로젝트의 아키텍처 가이드입니다.
  아래 규칙과 패턴을 따라 코드를 생성하세요.

  ## 프로젝트 구조

  ```
  project/
  ├── backend/
  │   ├── app/
  │   │   ├── __init__.py          # App factory (create_app)
  │   │   ├── config.py            # 환경별 설정 클래스
  │   │   ├── extensions.py        # SQLAlchemy, Migrate 등 확장 초기화
  │   │   ├── models/
  │   │   │   └── __init__.py
  │   │   ├── api/
  │   │   │   ├── __init__.py      # Blueprint 등록
  │   │   │   ├── auth.py
  │   │   │   └── resources.py
  │   │   ├── services/            # 비즈니스 로직 레이어
  │   │   └── utils/
  │   ├── tests/
  │   ├── requirements.txt
  │   └── wsgi.py                  # Gunicorn 엔트리포인트
  ├── frontend/
  │   ├── src/
  │   │   ├── App.vue
  │   │   ├── main.js
  │   │   ├── router/index.js
  │   │   ├── stores/              # Pinia 상태 관리
  │   │   ├── components/
  │   │   ├── views/
  │   │   ├── composables/         # Composition API 훅
  │   │   └── api/                 # Axios 인스턴스 + API 모듈
  │   ├── vite.config.js
  │   ├── index.html
  │   └── package.json
  ├── .env.example
  └── docker-compose.yaml
  ```

  ## 핵심 패턴

  1. **App Factory 패턴**: `create_app(config_name)` 함수로 Flask 앱을 생성. 테스트 시 다른 설정을 주입 가능.
     ```python
     def create_app(config_name="development"):
         app = Flask(__name__)
         app.config.from_object(config[config_name])
         register_extensions(app)
         register_blueprints(app)
         return app
     ```

  2. **Blueprint 구조**: API 엔드포인트를 기능별 Blueprint로 분리. URL prefix로 `/api/v1/` 사용.
     ```python
     api_bp = Blueprint("api", __name__, url_prefix="/api/v1")
     ```

  3. **Vue 3 Composition API**: `<script setup>` 문법 사용. Options API 대신 `ref`, `reactive`, `computed`, `watch` 활용.
     ```vue
     <script setup>
     import { ref, onMounted } from 'vue'
     const items = ref([])
     onMounted(async () => { items.value = await fetchItems() })
     </script>
     ```

  4. **Vite 프록시 설정**: 개발 시 CORS 우회를 위해 Vite 프록시로 Flask 백엔드에 요청 전달.
     ```js
     // vite.config.js
     export default defineConfig({
       server: {
         proxy: { '/api': 'http://localhost:5000' }
       }
     })
     ```

  5. **CORS 설정**: 프로덕션에서는 `flask-cors`로 허용 도메인 명시. 와일드카드(`*`) 사용 금지.
     ```python
     CORS(app, origins=["https://yourdomain.com"])
     ```

  ## 의존성

  **백엔드 (Python 3.11+)**:
  - Flask >= 3.0
  - flask-cors >= 4.0
  - Flask-SQLAlchemy >= 3.1
  - Flask-Migrate >= 4.0
  - gunicorn >= 21.2
  - python-dotenv >= 1.0

  **프론트엔드 (Node 18+)**:
  - vue >= 3.4
  - vite >= 5.0
  - vue-router >= 4.2
  - pinia >= 2.1
  - axios >= 1.6

  ## 주의사항

  - Flask의 `app.run(debug=True)`는 개발 전용. 프로덕션에서는 반드시 Gunicorn/uWSGI 사용.
  - `.env` 파일을 절대 커밋하지 마세요. `.env.example`만 커밋.
  - Vue의 `reactive()`는 원시값에 사용 불가 — 원시값은 `ref()` 사용.
  - 프론트엔드 빌드 결과물(`dist/`)을 Flask의 `static_folder`로 서빙할 때 `send_from_directory` 사용.
  - SQLAlchemy 세션은 요청 종료 시 자동 정리되므로 수동 `close()` 불필요.

  ## 코드 스타일

  - **Python**: snake_case (함수/변수), PascalCase (클래스), 4칸 들여쓰기
  - **Vue/JS**: camelCase (함수/변수), PascalCase (컴포넌트), 2칸 들여쓰기
  - **파일명**: Python은 snake_case.py, Vue 컴포넌트는 PascalCase.vue
  - **API 응답**: JSON, `{"data": ..., "error": null}` 일관된 래퍼 형식 사용
  - **HTTP 메서드**: RESTful 규칙 준수 (GET 조회, POST 생성, PUT 전체 수정, PATCH 부분 수정, DELETE 삭제)
